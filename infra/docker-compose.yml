services:
  # PostgreSQL 存储用户、会议、参与者、聊天、白板、文件和媒体锁等核心业务数据。
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # 数据卷保证容器重建后数据库内容仍然保留。
      - postgres-data:/var/lib/postgresql/data
    ports:
      # 宿主机 15432 映射到容器 5432，便于本机 pnpm dev 直接访问数据库。
      - "15432:5432"

  # Redis 用于 BullMQ 队列和实时状态协作，当前开发环境只暴露给宿主机调试。
  redis:
    image: redis:7-alpine
    ports:
      # 使用 16379 避免和宿主机已有 Redis 默认端口冲突。
      - "16379:6379"

  # MinIO 提供 S3 兼容对象存储，用于会议文件上传和白板图片保存。
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    # 9000 是对象 API，9001 是控制台；console-address 只影响管理界面端口。
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      # 对象文件落在独立数据卷，避免容器重建导致上传文件丢失。
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # 一次性初始化容器：创建业务 bucket，并把 bucket 设置成可匿名下载。
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb -p local/${MINIO_BUCKET} || true;
      mc anonymous set download local/${MINIO_BUCKET} || true;
      "

  # LiveKit 负责 WebRTC 信令和媒体转发；API 只负责签发 token，不直接处理音视频。
  livekit:
    image: livekit/livekit-server:v1.9.12
    # --dev 会启用适合本地开发的默认配置；生产环境应改为显式配置文件和真实密钥。
    command: --dev --bind 0.0.0.0
    environment:
      # LIVEKIT_KEYS 的格式是 "apiKey: apiSecret"，需要和 API 中的配置保持一致。
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
      # NODE_IP 会写入 ICE candidate。局域网/虚拟机访问时必须是浏览器可达的宿主机 IP。
      NODE_IP: ${LIVEKIT_NODE_IP:-127.0.0.1}
      # TCP 7881 和 UDP 50000-50100 是媒体端口；浏览器信令仍然走 7880 或 /rtc 代理。
      LIVEKIT_RTC_TCP_PORT: 7881
      LIVEKIT_RTC_PORT_RANGE_START: 50000
      LIVEKIT_RTC_PORT_RANGE_END: 50100
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

  # Nest API 容器。全 Docker 模式下会覆盖 .env 中指向宿主机的连接地址，改用 Compose 服务名。
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      # 容器间访问 PostgreSQL 使用服务名 postgres，而不是宿主机映射端口。
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      # 容器间访问 Redis 使用服务名 redis。
      REDIS_URL: redis://redis:6379
      # S3 SDK 在容器内访问 MinIO 服务名，公开下载地址仍由 MINIO_PUBLIC_URL 控制。
      MINIO_ENDPOINT: minio
      # 前端保持 same-origin 时，浏览器通过 reverse-proxy 的 /rtc 转发到 LiveKit。
      LIVEKIT_URL: ${LIVEKIT_URL:-same-origin}
      # API 签发 token 和管理 LiveKit 房间时使用容器内地址。
      LIVEKIT_SERVER_URL: http://livekit:7880
    depends_on:
      - postgres
      - redis
      - minio
      - livekit
    ports:
      - "3000:3000"

  # React/Vite 构建后的静态站点，运行时由 nginx 提供文件服务。
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"

  # Caddy 统一入口：把 /api、/ws、/rtc、/objects 和前端页面挂到同一个 origin 下。
  reverse-proxy:
    image: caddy:2.8-alpine
    depends_on:
      - api
      - web
      - livekit
      - minio
    ports:
      - "8080:80"
    volumes:
      # 只读挂载 Caddyfile，避免容器运行期间意外修改仓库配置。
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  # PostgreSQL 持久化数据卷。
  postgres-data:
  # MinIO 持久化对象数据卷。
  minio-data:
